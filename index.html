<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>学 Vokabeln</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vokabeln">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; background: #FAF7F0; overscroll-behavior: none; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
  #root { height: 100vh; height: 100dvh; max-width: 448px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; background: #FAF7F0; }
  input, select, textarea, button { font: inherit; }
  button { cursor: pointer; }
  ::-webkit-scrollbar { display: none; }
  .scroll { flex: 1; overflow-y: auto; }
  .btn { border: none; }
  @keyframes stampIn {
    0% { opacity:0; transform: translate(-50%,-50%) rotate(-18deg) scale(1.8); }
    60% { opacity:0.9; transform: translate(-50%,-50%) rotate(-10deg) scale(0.95); }
    100% { opacity:0.85; transform: translate(-50%,-50%) rotate(-12deg) scale(1); }
  }
  .seal-anim { transform: translate(-50%,-50%) rotate(-18deg) scale(1.6); opacity: 0; animation: stampIn 0.5s ease-out forwards; position:absolute; top:50%; left:50%; pointer-events:none; }
  @media (prefers-reduced-motion: reduce) {
    .seal-anim { animation: none; opacity: 0.85; transform: translate(-50%,-50%) rotate(-12deg) scale(1); }
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="fatal" style="display:none; padding:24px; font-family:-apple-system,sans-serif; color:#B23A2E;"></div>

<script>
(function () {
"use strict";

/* ---------- Palette & Type ---------- */
var C = {
  paper: "#FAF7F0", paper2: "#F2EDE1", ink: "#211E1A", inkSoft: "#5B564C",
  seal: "#B23A2E", sealSoft: "#D9C7BE", jade: "#4B6B57", jadeSoft: "#DCE5DC",
  bamboo: "#9C8C68", mist: "#E7E1D2"
};
var F = {
  display: "'Songti SC', Georgia, 'Times New Roman', serif",
  hanzi: "'PingFang SC', -apple-system, 'Helvetica Neue', sans-serif",
  body: "-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif",
  mono: "'SF Mono', ui-monospace, 'Menlo', monospace"
};

function esc(s) {
  return (s == null ? "" : String(s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ---------- Pinyin helpers ---------- */
var TONE_MAP = { "ā":"a","á":"a","ǎ":"a","à":"a","ē":"e","é":"e","ě":"e","è":"e","ī":"i","í":"i","ǐ":"i","ì":"i","ō":"o","ó":"o","ǒ":"o","ò":"o","ū":"u","ú":"u","ǔ":"u","ù":"u","ü":"v","ǖ":"v","ǘ":"v","ǚ":"v","ǜ":"v" };
function normalizePinyin(s) {
  s = (s || "").toLowerCase();
  var out = "";
  for (var i = 0; i < s.length; i++) out += TONE_MAP[s[i]] || s[i];
  return out.replace(/[^a-z0-9]/g, "");
}

/* ---------- Card factory & seed data ---------- */
function makeCards(list, prefix) {
  return list.map(function (c, i) {
    return {
      id: prefix + "-" + i, hanzi: c.hanzi, pinyin: c.pinyin, de: c.de,
      distractorsDE: c.d || [], example: c.ex || "",
      exampleHanzi: c.exHanzi || "", examplePinyin: c.exPinyin || "", exampleDe: c.exDe || "",
      interval: 0, ease: 2.5, reps: 0, lapses: 0,
      due: new Date().toISOString(), lastReview: null
    };
  });
}

var SEED_CARDS = makeCards([
  { hanzi: "气候", pinyin: "qì hòu", de: "das Klima" },
  { hanzi: "健康", pinyin: "jiàn kāng", de: "die Gesundheit / gesund" },
  { hanzi: "污染", pinyin: "wū rǎn", de: "die Verschmutzung" },
  { hanzi: "锻炼", pinyin: "duàn liàn", de: "trainieren, Sport treiben" },
  { hanzi: "预防", pinyin: "yù fáng", de: "vorbeugen" },
  { hanzi: "温度", pinyin: "wēn dù", de: "die Temperatur" },
  { hanzi: "症状", pinyin: "zhèng zhuàng", de: "das Symptom" },
  { hanzi: "适应", pinyin: "shì yìng", de: "sich anpassen" }
], "seed");

var FEMINISM_CARDS = makeCards([
  { hanzi: "平等", pinyin: "píng děng", de: "die Gleichheit, gleichberechtigt", d: ["die Freiheit", "die Gerechtigkeit", "die Toleranz"] },
  { hanzi: "男女平等", pinyin: "nán nǚ píng děng", de: "die Gleichberechtigung von Mann und Frau" },
  { hanzi: "女权主义", pinyin: "nǚ quán zhǔ yì", de: "der Feminismus", d: ["der Sozialismus", "der Kollektivismus", "der Aktivismus"] },
  { hanzi: "女权运动", pinyin: "nǚ quán yùn dòng", de: "die Frauenbewegung" },
  { hanzi: "女性主义者", pinyin: "nǚ xìng zhǔ yì zhě", de: "die Feministin, der Feminist" },
  { hanzi: "性别", pinyin: "xìng bié", de: "das Geschlecht" },
  { hanzi: "性别歧视", pinyin: "xìng bié qí shì", de: "die Geschlechterdiskriminierung", d: ["das Vorurteil", "die Ungleichheit", "der Stereotyp"] },
  { hanzi: "歧视", pinyin: "qí shì", de: "diskriminieren, die Diskriminierung" },
  { hanzi: "权利", pinyin: "quán lì", de: "das Recht (die Rechte)" },
  { hanzi: "平权", pinyin: "píng quán", de: "die Gleichberechtigung (als Bewegung)" },
  { hanzi: "父权", pinyin: "fù quán", de: "das Patriarchat" },
  { hanzi: "赋权", pinyin: "fù quán", de: "Empowerment, ermächtigen", ex: "Achtung: gleiches Pinyin wie 父权, andere Zeichen." },
  { hanzi: "偏见", pinyin: "piān jiàn", de: "das Vorurteil" },
  { hanzi: "刻板印象", pinyin: "kè bǎn yìn xiàng", de: "das Stereotyp, das Klischee" },
  { hanzi: "同工同酬", pinyin: "tóng gōng tóng chóu", de: "gleicher Lohn für gleiche Arbeit" },
  { hanzi: "玻璃天花板", pinyin: "bō lí tiān huā bǎn", de: "die gläserne Decke" },
  { hanzi: "家务劳动", pinyin: "jiā wù láo dòng", de: "die Hausarbeit" },
  { hanzi: "生育权", pinyin: "shēng yù quán", de: "reproduktive Rechte" },
  { hanzi: "婚姻自由", pinyin: "hūn yīn zì yóu", de: "die Ehefreiheit" },
  { hanzi: "多元化", pinyin: "duō yuán huà", de: "die Diversität, Vielfalt" },
  { hanzi: "包容", pinyin: "bāo róng", de: "die Toleranz, inklusiv sein" },
  { hanzi: "觉醒", pinyin: "jué xǐng", de: "das Erwachen, Bewusstwerden" },
  { hanzi: "争取", pinyin: "zhēng qǔ", de: "sich einsetzen für, erkämpfen" },
  { hanzi: "独立", pinyin: "dú lì", de: "die Unabhängigkeit" },
  { hanzi: "社会地位", pinyin: "shè huì dì wèi", de: "der gesellschaftliche Status" }
], "fem");

/* ---------- SRS ---------- */
function schedule(card, grade) {
  var interval = card.interval, ease = card.ease, reps = card.reps, lapses = card.lapses;
  if (grade === 0) { reps = 0; lapses += 1; interval = 1; ease = Math.max(1.3, ease - 0.2); }
  else {
    if (reps === 0) interval = 1;
    else if (reps === 1) interval = 6;
    else interval = Math.round(interval * ease);
    if (grade === 1) { ease = Math.max(1.3, ease - 0.15); interval = Math.max(1, Math.round(interval * 0.8)); }
    if (grade === 3) { ease = ease + 0.15; interval = Math.round(interval * 1.3); }
    reps += 1;
  }
  var due = new Date(); due.setDate(due.getDate() + interval);
  var out = {}; for (var k in card) out[k] = card[k];
  out.interval = interval; out.ease = ease; out.reps = reps; out.lapses = lapses;
  out.due = due.toISOString(); out.lastReview = new Date().toISOString();
  return out;
}

/* ---------- localStorage ---------- */
function loadCards() { try { var v = localStorage.getItem("vokabel_cards"); return v ? JSON.parse(v) : SEED_CARDS; } catch (e) { return SEED_CARDS; } }
function saveCards(cards) { try { localStorage.setItem("vokabel_cards", JSON.stringify(cards)); } catch (e) {} }
function loadReviews() { try { var v = localStorage.getItem("vokabel_reviews"); return v ? JSON.parse(v) : []; } catch (e) { return []; } }
function saveReviews(r) { try { localStorage.setItem("vokabel_reviews", JSON.stringify(r.slice(-500))); } catch (e) {} }

/* ---------- App state ---------- */
var MODES = [
  { id: "mix", label: "Gemischt" }, { id: "h2d", label: "Hanzi → DE" }, { id: "d2h", label: "DE → Hanzi" },
  { id: "pinyin", label: "Pinyin eingeben" }, { id: "mc", label: "Multiple Choice" }, { id: "hints", label: "Hinweise" }
];
var REAL_MODES = ["h2d", "d2h", "pinyin", "mc", "hints"];
function modeLabel(id) { for (var i = 0; i < MODES.length; i++) if (MODES[i].id === id) return MODES[i].label; return ""; }
function pickMode(m) { return m === "mix" ? REAL_MODES[Math.floor(Math.random() * REAL_MODES.length)] : m; }

function speak(text) {
  try {
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}
function speakBtn(text) {
  return '<button class="btn" data-action="speak" data-text="' + esc(text) + '" style="' + styleStr({ background: "none", color: C.bamboo, fontSize: "20px", padding: "4px 8px", marginTop: "2px" }) + '">🔊</button>';
}
function exampleBlock(card) {
  if (!card.exampleHanzi) return "";
  return '<div style="' + styleStr({ marginTop: "14px", paddingTop: "12px", borderTop: "1px solid " + C.mist, textAlign: "center", width: "100%" }) + '">' +
    '<div style="' + styleStr({ fontFamily: F.hanzi, fontSize: "16px", color: C.ink }) + '">' + esc(card.exampleHanzi) + speakBtn(card.exampleHanzi) + '</div>' +
    (card.examplePinyin ? '<div style="' + styleStr({ fontFamily: F.mono, fontSize: "11.5px", color: C.bamboo, marginTop: "2px" }) + '">' + esc(card.examplePinyin) + '</div>' : "") +
    (card.exampleDe ? '<div style="' + styleStr({ fontFamily: F.body, fontSize: "12px", color: C.inkSoft, marginTop: "2px" }) + '">' + esc(card.exampleDe) + '</div>' : "") +
    '</div>';
}

var state = {
  view: "home",
  cards: loadCards(),
  reviews: loadReviews(),
  session: null,
  pickingMode: false,
  cardsTab: "list",
  addForm: { hanzi: "", pinyin: "", de: "", example: "" },
  importText: "",
  hasHeader: true,
  colMap: { hanzi: 0, pinyin: 1, de: 2, d1: -1, d2: -1, d3: -1, exHanzi: -1, exPinyin: -1, exDe: -1, example: -1 }
};

function setCards(next) { state.cards = next; saveCards(next); }
function dueCount() { var now = new Date(); return state.cards.filter(function (c) { return new Date(c.due) <= now; }).length; }

/* ---------- Session helpers ---------- */
function mcOptionsFor(card, allCards) {
  var pool = (card.distractorsDE || []).filter(Boolean).slice(0, 3);
  if (pool.length < 3) {
    var others = allCards.filter(function (c) { return c.id !== card.id && c.de !== card.de && pool.indexOf(c.de) === -1; });
    var shuffled = others.slice().sort(function () { return Math.random() - 0.5; });
    while (pool.length < 3 && shuffled.length) pool.push(shuffled.pop().de);
  }
  var opts = pool.concat([card.de]);
  return opts.sort(function () { return Math.random() - 0.5; });
}

function resetCardEphemeral(s) {
  s.revealed = false; s.hintLevel = 0; s.pinyinInput = ""; s.pinyinResult = null;
  s.mcChoice = null; s.mcOptions = null; s.stampVisible = false;
}

function startSession(queue, mode) {
  var s = { queue: queue, mode: mode, idx: 0, results: [] };
  resetCardEphemeral(s);
  s.modeForCard = pickMode(mode);
  if (s.modeForCard === "mc") s.mcOptions = mcOptionsFor(queue[0], state.cards);
  state.session = s;
  state.pickingMode = false;
  render();
}

function currentCard() { return state.session.queue[state.session.idx]; }

function gradeCard(g) {
  var s = state.session;
  if (g >= 2) {
    s.stampVisible = true;
    render();
    setTimeout(function () { advanceSession(g); }, 420);
  } else {
    advanceSession(g);
  }
}

function advanceSession(g) {
  var s = state.session;
  var card = currentCard();
  s.results.push(g);
  setCards(state.cards.map(function (c) { return c.id === card.id ? schedule(c, g) : c; }));
  var reviews = state.reviews.concat([{ date: new Date().toISOString(), cardId: card.id, grade: g, mode: s.modeForCard }]);
  state.reviews = reviews; saveReviews(reviews);
  s.idx += 1;
  resetCardEphemeral(s);
  if (s.idx < s.queue.length) {
    s.modeForCard = pickMode(s.mode);
    if (s.modeForCard === "mc") s.mcOptions = mcOptionsFor(s.queue[s.idx], state.cards);
  }
  render();
}

/* ---------- Render helpers ---------- */
function styleStr(o) {
  var parts = [];
  for (var k in o) {
    if (o[k] === undefined || o[k] === null) continue;
    var prop = k.replace(/[A-Z]/g, function (m) { return "-" + m.toLowerCase(); });
    parts.push(prop + ":" + o[k]);
  }
  return parts.join(";");
}

function sealStamp(show) {
  if (!show) return "";
  return '<div class="seal-anim"><div style="' + styleStr({ width: "76px", height: "76px", borderRadius: "50%", border: "3px solid " + C.seal, display: "flex", alignItems: "center", justifyContent: "center", color: C.seal, fontFamily: F.display, fontSize: "28px", fontWeight: "700", boxShadow: "0 0 0 2px " + C.paper, background: "rgba(178,58,46,0.06)" }) + '">對</div></div>';
}

function ledgerHeader(title, sub) {
  var d = new Date().toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
  return '<div style="' + styleStr({ borderBottom: "1px solid " + C.mist, background: C.paper, padding: "20px 20px 12px", flexShrink: "0" }) + '">' +
    '<div style="' + styleStr({ display: "flex", alignItems: "baseline", justifyContent: "space-between" }) + '">' +
    '<h1 style="' + styleStr({ fontFamily: F.display, color: C.ink, fontSize: "22px", fontWeight: "600", margin: "0" }) + '">' + esc(title) + '</h1>' +
    '<span style="' + styleStr({ fontFamily: F.mono, color: C.bamboo, fontSize: "11px" }) + '">' + d + '</span></div>' +
    (sub ? '<div style="' + styleStr({ fontFamily: F.body, color: C.inkSoft, fontSize: "13px", marginTop: "2px" }) + '">' + esc(sub) + '</div>' : "") +
    '</div>';
}

function bottomNav() {
  var due = dueCount();
  var items = [{ id: "home", label: "Lernen" }, { id: "stats", label: "Statistik" }, { id: "cards", label: "Karten" }];
  var html = '<div style="' + styleStr({ borderTop: "1px solid " + C.mist, background: C.paper, display: "flex", flexShrink: "0" }) + '">';
  items.forEach(function (it) {
    var active = state.view === it.id;
    html += '<button class="btn" data-action="nav" data-view="' + it.id + '" style="' + styleStr({ flex: "1", display: "flex", flexDirection: "column", alignItems: "center", gap: "2px", padding: "10px 0", position: "relative", background: "none", color: active ? C.seal : C.inkSoft, fontFamily: F.body, fontSize: "11px" }) + '">' +
      '<span>' + it.label + '</span>';
    if (it.id === "home" && due) html += '<span style="' + styleStr({ position: "absolute", top: "2px", right: "28%", background: C.seal, color: "#fff", fontSize: "10px", fontFamily: F.mono, borderRadius: "8px", padding: "1px 5px", minWidth: "16px", textAlign: "center" }) + '">' + due + '</span>';
    html += '</button>';
  });
  return html + '</div>';
}

function gradeButtons(suggestion) {
  var opts = [{ g: 0, label: "Nochmal", color: C.seal }, { g: 1, label: "Schwer", color: C.bamboo }, { g: 2, label: "Gut", color: C.jade }, { g: 3, label: "Leicht", color: C.jade }];
  var html = '<div style="' + styleStr({ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "8px", width: "100%" }) + '">';
  opts.forEach(function (o) {
    var active = suggestion === o.g;
    html += '<button class="btn" data-action="grade" data-g="' + o.g + '" style="' + styleStr({ padding: "12px 0", borderRadius: "8px", background: active ? o.color : C.paper2, color: active ? "#fff" : C.ink, border: "1px solid " + (active ? o.color : C.mist), fontFamily: F.body, fontSize: "12.5px", fontWeight: "500" }) + '">' + o.label + '</button>';
  });
  return html + '</div>';
}

function box(inner, stampVisible) {
  return '<div style="' + styleStr({ background: "#fff", border: "1px solid " + C.mist, borderRadius: "6px", width: "100%", minHeight: "220px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 24px", position: "relative", overflow: "hidden" }) + '">' + sealStamp(stampVisible) + inner + '</div>';
}

function renderStudyCard() {
  var s = state.session, card = currentCard(), mode = s.modeForCard;

  if (mode === "h2d") {
    var inner = '<div style="' + styleStr({ fontFamily: F.hanzi, fontSize: "52px", color: C.ink }) + '">' + esc(card.hanzi) + '</div>' +
      speakBtn(card.hanzi) +
      '<div style="' + styleStr({ fontFamily: F.mono, color: C.bamboo, fontSize: "14px", marginTop: "6px" }) + '">' + esc(card.pinyin) + '</div>';
    if (s.revealed) {
      inner += '<div style="' + styleStr({ marginTop: "20px", textAlign: "center" }) + '"><div style="' + styleStr({ fontFamily: F.body, fontSize: "17px", color: C.ink, fontWeight: "500" }) + '">' + esc(card.de) + '</div>';
      if (card.example) inner += '<div style="' + styleStr({ fontFamily: F.body, fontSize: "13px", color: C.inkSoft, marginTop: "6px" }) + '">' + esc(card.example) + '</div>';
      inner += '</div>' + exampleBlock(card);
    }
    var html = '<div style="' + styleStr({ display: "flex", flexDirection: "column", gap: "16px", width: "100%" }) + '">' + box(inner, s.stampVisible);
    html += s.revealed ? gradeButtons() : '<button class="btn" data-action="reveal" style="' + styleStr({ background: C.ink, color: "#fff", fontFamily: F.body, fontSize: "14px", padding: "12px 0", borderRadius: "999px", width: "100%" }) + '">Antwort zeigen</button>';
    return html + '</div>';
  }

  if (mode === "d2h") {
    var inner2 = '<div style="' + styleStr({ fontFamily: F.body, fontSize: "19px", color: C.ink, textAlign: "center", fontWeight: "500" }) + '">' + esc(card.de) + '</div>';
    if (s.revealed) {
      inner2 += '<div style="' + styleStr({ marginTop: "20px", textAlign: "center" }) + '"><div style="' + styleStr({ fontFamily: F.hanzi, fontSize: "48px", color: C.ink }) + '">' + esc(card.hanzi) + '</div>' +
        speakBtn(card.hanzi) +
        '<div style="' + styleStr({ fontFamily: F.mono, color: C.bamboo, fontSize: "14px", marginTop: "6px" }) + '">' + esc(card.pinyin) + '</div></div>' + exampleBlock(card);
    }
    var html2 = '<div style="' + styleStr({ display: "flex", flexDirection: "column", gap: "16px", width: "100%" }) + '">' + box(inner2, s.stampVisible);
    html2 += s.revealed ? gradeButtons() : '<button class="btn" data-action="reveal" style="' + styleStr({ background: C.ink, color: "#fff", fontFamily: F.body, fontSize: "14px", padding: "12px 0", borderRadius: "999px", width: "100%" }) + '">Antwort zeigen</button>';
    return html2 + '</div>';
  }

  if (mode === "pinyin") {
    var inner3 = '<div style="' + styleStr({ fontFamily: F.hanzi, fontSize: "52px", color: C.ink }) + '">' + esc(card.hanzi) + '</div>' +
      speakBtn(card.hanzi) +
      '<div style="' + styleStr({ fontFamily: F.body, fontSize: "12px", color: C.bamboo, marginTop: "4px" }) + '">' + esc(card.de) + '</div>';
    if (!s.revealed) {
      inner3 += '<input data-bind="pinyinInput" autocapitalize="none" autocorrect="off" value="' + esc(s.pinyinInput) + '" placeholder="pinyin eingeben (klein)" style="' + styleStr({ fontFamily: F.mono, border: "1px solid " + C.mist, borderRadius: "6px", padding: "10px 12px", marginTop: "16px", width: "100%", fontSize: "15px", textAlign: "center" }) + '" />';
    } else {
      inner3 += '<div style="' + styleStr({ marginTop: "16px", textAlign: "center" }) + '"><div style="' + styleStr({ fontFamily: F.body, fontSize: "13px", color: s.pinyinResult ? C.jade : C.seal, fontWeight: "600" }) + '">' + (s.pinyinResult ? "Richtig" : "Nicht ganz") + '</div>' +
        '<div style="' + styleStr({ fontFamily: F.mono, color: C.ink, fontSize: "16px", marginTop: "4px" }) + '">' + esc(card.pinyin) + '</div></div>';
    }
    var html3 = '<div style="' + styleStr({ display: "flex", flexDirection: "column", gap: "16px", width: "100%" }) + '">' + box(inner3, s.stampVisible);
    html3 += !s.revealed
      ? '<button class="btn" data-action="pinyin-check" style="' + styleStr({ background: C.ink, color: "#fff", fontFamily: F.body, fontSize: "14px", padding: "12px 0", borderRadius: "999px", width: "100%" }) + '">Prüfen</button>'
      : gradeButtons(s.pinyinResult ? 2 : 0);
    return html3 + '</div>';
  }

  if (mode === "mc") {
    var inner4 = '<div style="' + styleStr({ fontFamily: F.hanzi, fontSize: "52px", color: C.ink }) + '">' + esc(card.hanzi) + '</div>';
    if (s.revealed) inner4 += speakBtn(card.hanzi) + '<div style="' + styleStr({ fontFamily: F.mono, color: C.bamboo, fontSize: "14px", marginTop: "6px" }) + '">' + esc(card.pinyin) + '</div>';

function renderStats() {

  var last30 = state.reviews.filter(function (r) { return new Date(r.date) > new Date(Date.now() - 30 * 864e5); });

    '<div><div style="' + styleStr({ fontFamily: F.body, fontSize: "12px", color: C.bamboo, textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: "8px" }) + '">Schwierige Karten</div>';

  return html;

  });
  html += '</div></div>';
  return html;
}

/* ---------- Master render ---------- */
function render() {
  var html = "";
  if (!state.session) {
    html += ledgerHeader(
      state.view === "home" ? "学 Vokabeln" : state.view === "stats" ? "Statistik" : "Karten verwalten",
      state.view === "home" ? dueCount() + " fällig heute" : undefined
    );
  }
  html += '<div class="scroll">';
  if (state.session) html += renderSession();
  else if (state.view === "home") html += renderHome();
  else if (state.view === "stats") html += renderStats();
  else html += renderCardsView();
  html += "</div>";
  if (!state.session) html += bottomNav();
  document.getElementById("root").innerHTML = html;
}

/* ---------- Event delegation ---------- */
function setNested(path, value) {
  var parts = path.split(".");
  var obj = state;
  for (var i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = value;
}

document.getElementById("root").addEventListener("click", function (e) {
  var el = e.target.closest("[data-action]");
  if (!el) return;
  var action = el.getAttribute("data-action");

  if (action === "nav") { state.view = el.getAttribute("data-view"); state.session = null; render(); return; }
  if (action === "speak") { speak(el.getAttribute("data-text")); return; }
  if (action === "open-mode-picker") { state.pickingMode = true; render(); return; }
  if (action === "close-sheet") { if (e.target.id === "modeSheetBackdrop") { state.pickingMode = false; render(); } return; }
  if (action === "start-session") {
    var now = new Date();
    var due = state.cards.filter(function (c) { return new Date(c.due) <= now; });
    var fresh = state.cards.filter(function (c) { return c.reps === 0; });
    var queue = due.length ? due : fresh;
    startSession(queue, el.getAttribute("data-mode"));
    return;
  }
  if (action === "session-exit") { state.session = null; render(); return; }
  if (action === "reveal") { state.session.revealed = true; render(); return; }
  if (action === "grade") { gradeCard(Number(el.getAttribute("data-g"))); return; }
  if (action === "hint") { state.session.hintLevel = Math.min(3, state.session.hintLevel + 1); render(); return; }
  if (action === "solution") { state.session.revealed = true; render(); return; }
  if (action === "pinyin-check") {
    var s = state.session, card = currentCard();
    s.pinyinResult = normalizePinyin(s.pinyinInput) === normalizePinyin(card.pinyin);
    s.revealed = true; render(); return;
  }
  if (action === "mc-pick") {
    var s2 = state.session;
    s2.mcChoice = s2.mcOptions[Number(el.getAttribute("data-idx"))];
    s2.revealed = true; render(); return;
  }
  if (action === "cards-tab") { var t = el.getAttribute("data-tab"); state.cardsTab = state.cardsTab === t ? "list" : t; render(); return; }
  if (action === "add-card") {
    var f = state.addForm;
    if (!f.hanzi.trim() || !f.de.trim()) return;
    setCards([{ id: "c-" + Date.now(), hanzi: f.hanzi.trim(), pinyin: f.pinyin.trim(), de: f.de.trim(), example: f.example.trim(), distractorsDE: [], interval: 0, ease: 2.5, reps: 0, lapses: 0, due: new Date().toISOString(), lastReview: null }].concat(state.cards));
    state.addForm = { hanzi: "", pinyin: "", de: "", example: "" };
    state.cardsTab = "list"; render(); return;
  }
  if (action === "add-feminism-set") {
    var existing = {}; state.cards.forEach(function (c) { existing[c.hanzi] = true; });
    setCards(FEMINISM_CARDS.filter(function (c) { return !existing[c.hanzi]; }).concat(state.cards));
    render(); return;
  }
  if (action === "remove-card") {
    var id = el.getAttribute("data-id");
    setCards(state.cards.filter(function (c) { return c.id !== id; }));
    render(); return;
  }
  if (action === "import-read") {
    var ta = document.getElementById("importTextarea");
    if (ta) { state.importText = ta.value; render(); }
    return;
  }
  if (action === "toggle-header") { state.hasHeader = el.checked; render(); return; }
  if (action === "import-do") {
    var table2 = parseTable(state.importText);
    var dataRows2 = state.hasHeader ? table2.slice(1) : table2;
    var now2 = new Date().toISOString();
    var cm = state.colMap;
    var newCards = dataRows2.filter(function (r) { return stripHtml(r[cm.hanzi]); }).map(function (r, i) {
      return {
        id: "imp-" + Date.now() + "-" + i, hanzi: stripHtml(r[cm.hanzi]),
        pinyin: cm.pinyin >= 0 ? stripHtml(r[cm.pinyin]) : "", de: cm.de >= 0 ? stripHtml(r[cm.de]) : "",
        distractorsDE: [cm.d1, cm.d2, cm.d3].map(function (ci) { return ci >= 0 ? stripHtml(r[ci]) : ""; }).filter(Boolean),
        example: cm.example >= 0 ? stripHtml(r[cm.example]) : "",
        exampleHanzi: cm.exHanzi >= 0 ? stripHtml(r[cm.exHanzi]) : "",
        examplePinyin: cm.exPinyin >= 0 ? stripHtml(r[cm.exPinyin]) : "",
        exampleDe: cm.exDe >= 0 ? stripHtml(r[cm.exDe]) : "",
        interval: 0, ease: 2.5, reps: 0, lapses: 0, due: now2, lastReview: null
      };
    });
    var existing2 = {}; state.cards.forEach(function (c) { existing2[c.hanzi] = true; });
    setCards(newCards.filter(function (c) { return c.hanzi && !existing2[c.hanzi]; }).concat(state.cards));
    state.importText = ""; state.cardsTab = "list"; render(); return;
  }
});

document.getElementById("root").addEventListener("input", function (e) {
  var bind = e.target.getAttribute("data-bind");
  if (!bind) return;
  var val = e.target.value;
  if (bind === "pinyinInput") val = val.toLowerCase();
  setNested(bind, val);
  if (bind === "importText" || bind === "pinyinInput") render();
});

document.getElementById("root").addEventListener("paste", function (e) {
  var bind = e.target.getAttribute("data-bind");
  if (!bind) return;
  var el = e.target;
  setTimeout(function () {
    var val = el.value;
    if (bind === "pinyinInput") val = val.toLowerCase();
    setNested(bind, val);
    render();
  }, 0);
});

document.getElementById("root").addEventListener("change", function (e) {
  if (e.target.getAttribute("data-action") === "colmap") {
    state.colMap[e.target.getAttribute("data-field")] = Number(e.target.value);
    render(); return;
  }
});

/* ---------- Boot ---------- */
try {
  render();
} catch (err) {
  document.getElementById("root").style.display = "none";
  var f = document.getElementById("fatal");
  f.style.display = "block";
  f.textContent = "Fehler beim Start: " + (err && err.message ? err.message : err);
}
})();
</script>
</body>
</html>
